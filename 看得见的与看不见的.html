<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆卷 · 看得见的与看不见的</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=ZCOOL+XiaoWei&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0e8;font-family:'Noto Serif SC','PingFang SC',Georgia,serif;color:#2c2418;overflow-x:hidden}
  html{scroll-behavior:smooth}
  ::selection{background:rgba(180,100,50,0.18)}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#ebe5d8}
  ::-webkit-scrollbar-thumb{background:rgba(140,100,60,0.3);border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glowPulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  @keyframes slideOpen{from{max-height:0;opacity:0}to{max-height:8000px;opacity:1}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes pageIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
  .fade-up{animation:fadeUp 0.4s ease both}
  .page-in{animation:pageIn 0.35s ease both}
  @media(max-width:480px){
    .ink-compare-inner{flex-wrap:wrap!important}
    .ink-compare-inner>*{flex-basis:100%!important;min-width:0!important}
    .ink-compare-divider{display:none!important}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const P={
  paper:"#f5f0e8",paperDeep:"#efe9dd",paperLight:"#faf7f0",
  pageShadow:"rgba(120,100,70,0.06)",
  text:"#2c2418",textSoft:"#6a5d4e",textMuted:"#a89a88",textChapter:"#4a3f30",
  vermillion:"#c85030",
  colors:[
    {name:"赭石",hex:"#a87a28",glow:"rgba(168,122,40,0.12)"},
    {name:"深棕",hex:"#7a5030",glow:"rgba(122,80,48,0.12)"},
    {name:"砖红",hex:"#b84828",glow:"rgba(184,72,40,0.12)"},
    {name:"琥珀",hex:"#9e8228",glow:"rgba(158,130,40,0.12)"},
    {name:"橄榄",hex:"#5e6848",glow:"rgba(94,104,72,0.12)"},
  ],
};

function PaperBg(){
  return(
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none"}}>
      <svg width="100%" height="100%" style={{position:"absolute",inset:0,opacity:0.035}}>
        <defs><filter id="pf"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="12"/><feColorMatrix type="saturate" values="0"/></filter></defs>
        <rect width="100%" height="100%" fill="#a09070" filter="url(#pf)"/>
      </svg>
      <svg width="100%" height="100%" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" style={{position:"absolute",inset:0,opacity:0.025}}>
        <defs><filter id="ms"><feGaussianBlur stdDeviation="22"/></filter></defs>
        <path d="M-50 600 Q200 480 400 530 Q600 440 800 500 Q1000 420 1200 480 Q1400 450 1450 490 L1450 900 L-50 900Z" fill="#a09070" opacity="0.5" filter="url(#ms)"/>
        <path d="M0 0 Q150 120 80 280 Q20 400 100 500" fill="none" stroke="#907050" strokeWidth="60" opacity="0.04" filter="url(#ms)"/>
      </svg>
    </div>
  );
}

function SealIcon({char="拆",color=P.vermillion,size=48,glow=true}){
  const[h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{width:size,height:size,position:"relative",flexShrink:0,cursor:"default"}}>
      <div style={{position:"absolute",inset:-4,borderRadius:"50%",background:`radial-gradient(circle,${color}${h?"15":"08"} 0%,transparent 70%)`,transition:"all 0.5s",filter:"blur(3px)"}}/>
      <div style={{position:"absolute",inset:0,border:`1.5px solid ${h?color:color+"60"}`,borderRadius:5,transform:"rotate(-3deg)",transition:"all 0.4s",boxShadow:h?`0 0 14px ${color}20`:"none"}}/>
      <div style={{position:"absolute",inset:3,border:`1px solid ${h?color+"50":color+"25"}`,borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.4s"}}/>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",transform:"rotate(-3deg)"}}>
        <span style={{fontSize:size*0.42,fontWeight:900,color,fontFamily:"'ZCOOL XiaoWei','Noto Serif SC',serif",transition:"all 0.4s"}}>{char}</span>
      </div>
    </div>
  );
}

function MiniLandscape({color=P.colors[0].hex,size=44,variant=0}){
  const v=variant%4;
  return(
    <svg width={size} height={size} viewBox="0 0 52 52" style={{flexShrink:0,opacity:0.8}}>
      {v===0&&<g><path d="M4 38 Q14 12 26 28 Q34 10 48 34 L48 48 L4 48Z" fill={color+"15"} stroke={color+"40"} strokeWidth="0.8"/><path d="M0 42 Q12 28 24 38 Q36 24 52 36 L52 52 L0 52Z" fill={color+"20"} stroke={color+"50"} strokeWidth="0.8"/></g>}
      {v===1&&<g><line x1="20" y1="48" x2="18" y2="6" stroke={color+"50"} strokeWidth="1.5" strokeLinecap="round"/><path d="M18 12 Q10 8 6 14" fill="none" stroke={color+"40"} strokeWidth="1" strokeLinecap="round"/><path d="M18 20 Q12 16 8 22" fill="none" stroke={color+"35"} strokeWidth="1" strokeLinecap="round"/><path d="M18 28 Q24 24 28 30" fill="none" stroke={color+"40"} strokeWidth="1" strokeLinecap="round"/></g>}
      {v===2&&<g><path d="M4 22 Q14 16 26 22 Q38 28 48 22" fill="none" stroke={color+"45"} strokeWidth="1" strokeLinecap="round"/><path d="M8 30 Q18 24 30 30 Q42 36 48 30" fill="none" stroke={color+"35"} strokeWidth="0.8" strokeLinecap="round"/><path d="M4 38 Q14 32 26 38 Q38 44 48 38" fill="none" stroke={color+"25"} strokeWidth="0.6" strokeLinecap="round"/></g>}
      {v===3&&<g><ellipse cx="26" cy="30" rx="20" ry="8" fill={color+"08"} stroke={color+"20"} strokeWidth="0.5"/><ellipse cx="18" cy="26" rx="10" ry="5" fill={color+"0c"} stroke={color+"28"} strokeWidth="0.5"/><path d="M10 20 Q16 8 26 14 Q36 6 44 16" fill="none" stroke={color+"30"} strokeWidth="0.7" strokeLinecap="round"/></g>}
    </svg>
  );
}

function ReadBar({progress}){
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,height:2,zIndex:100,background:"rgba(160,140,110,0.1)"}}>
      <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${P.vermillion}60,${P.vermillion})`,transition:"width 0.3s ease",borderRadius:"0 1px 1px 0"}}/>
    </div>
  );
}

function ChTab({label,char,color,active,onClick,isOverview}){
  return(
    <button onClick={onClick} style={{
      padding:"10px 14px",border:"none",display:"flex",alignItems:"center",gap:6,
      background:active?P.paperLight:"transparent",
      borderBottom:active?`2px solid ${color}`:"2px solid transparent",
      borderRight:isOverview?"1px solid rgba(160,140,110,0.15)":"none",
      color:active?P.textChapter:P.textMuted,fontSize:13,fontWeight:active?700:400,
      letterSpacing:active?1.5:0.5,cursor:"pointer",transition:"all 0.3s",
      fontFamily:"'Noto Serif SC',serif",whiteSpace:"nowrap",flexShrink:0,
    }}>
      {char&&<span style={{fontSize:10,fontWeight:900,fontFamily:"'ZCOOL XiaoWei',serif",border:`1px solid ${active?color+"60":color+"25"}`,color:active?color:color+"60",width:18,height:18,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.3s",background:active?color+"08":"transparent"}}>{char}</span>}
      {label}
    </button>
  );
}

function Sidebar({chapters,current,onSelect,open,onClose}){
  return(
    <div>
      {open&&<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(60,50,30,0.2)",zIndex:98}}/>}
      <div style={{position:"fixed",top:0,left:open?0:-320,width:300,height:"100vh",background:P.paperDeep,borderRight:`1px solid rgba(160,140,110,0.15)`,boxShadow:open?"4px 0 30px rgba(80,60,30,0.1)":"none",zIndex:99,transition:"left 0.35s cubic-bezier(.4,0,.2,1)",padding:"32px 0",overflowY:"auto"}}>
        <div style={{padding:"0 24px 24px",borderBottom:`1px solid rgba(160,140,110,0.12)`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <SealIcon char="目" color={P.vermillion} size={28} glow={false}/>
            <span style={{fontSize:16,fontWeight:700,color:P.textChapter,letterSpacing:3}}>目录</span>
          </div>
          <div style={{marginTop:10,fontSize:12,color:P.textMuted,lineHeight:1.7}}>看得见的与看不见的</div>
        </div>
        {chapters.map((ch,i)=>(
          <div key={i} onClick={()=>{onSelect(i);onClose();}} style={{padding:"14px 24px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:current===i?ch.color+"08":"transparent",borderLeft:current===i?`3px solid ${ch.color}`:"3px solid transparent",transition:"all 0.25s"}}>
            <span style={{fontSize:11,fontWeight:900,fontFamily:"'ZCOOL XiaoWei',serif",color:current===i?ch.color:P.textMuted,border:`1px solid ${current===i?ch.color+"50":P.textMuted+"30"}`,width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)"}}>{ch.char}</span>
            <span style={{fontSize:14,color:current===i?P.textChapter:P.textSoft,fontWeight:current===i?600:400}}>{ch.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function PageNav({current,total,name,onPrev,onNext}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 0",borderTop:`1px solid rgba(160,140,110,0.15)`,marginTop:40}}>
      <button onClick={current>0?onPrev:undefined} style={{padding:"10px 20px",border:current>0?"1px solid rgba(160,140,110,0.25)":"1px solid transparent",borderRadius:6,background:current>0?P.paperLight:"transparent",color:current>0?P.textSoft:"transparent",fontSize:14,cursor:current>0?"pointer":"default",fontFamily:"'Noto Serif SC',serif"}}>{"← 上一章"}</button>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:12,color:P.textMuted,letterSpacing:2}}>{name}</div>
        <div style={{fontSize:11,color:P.textMuted,marginTop:2}}>{current+1} / {total}</div>
      </div>
      <button onClick={current<total-1?onNext:undefined} style={{padding:"10px 20px",border:current<total-1?"1px solid rgba(160,140,110,0.25)":"1px solid transparent",borderRadius:6,background:current<total-1?P.paperLight:"transparent",color:current<total-1?P.textSoft:"transparent",fontSize:14,cursor:current<total-1?"pointer":"default",fontFamily:"'Noto Serif SC',serif"}}>{"下一章 →"}</button>
    </div>
  );
}

function SecTitle({title,sub,color=P.colors[0].hex,char,ls=0}){
  return(
    <div style={{marginBottom:32,paddingTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
        <SealIcon char={char} color={color} size={44} glow={false}/>
        <div style={{opacity:0.3,marginLeft:-28,marginTop:14}}><MiniLandscape color={color} size={32} variant={ls}/></div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:4,color:P.textChapter,fontFamily:"'Noto Serif SC',serif",lineHeight:1.4}}>{title}</h2>
      </div>
      {sub&&<p style={{fontSize:15,color:P.textSoft,lineHeight:1.9,borderLeft:`2px solid ${color}30`,paddingLeft:16,marginLeft:2}}>{sub}</p>}
      <div style={{height:1,background:`linear-gradient(90deg,${color}40,transparent 60%)`,marginTop:16}}/>
    </div>
  );
}

function Card({children,color=P.colors[0].hex,style={}}){
  const[h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:P.paperLight,borderRadius:10,padding:28,borderLeft:`3px solid ${h?color:color+"50"}`,boxShadow:h?`0 4px 24px ${P.pageShadow},0 0 20px ${color}08`:`0 1px 8px ${P.pageShadow}`,transition:"all 0.35s ease",transform:h?"translateY(-2px)":"none",position:"relative",overflow:"hidden",...style}}>
      {children}
    </div>
  );
}

function Para({children}){
  return <p style={{fontSize:16,color:P.text,lineHeight:2.0,marginBottom:16,textAlign:"justify"}}>{children}</p>;
}

function Step({n,text,detail,color=P.colors[1].hex}){
  return(
    <div style={{display:"flex",gap:16,marginBottom:20,alignItems:"flex-start"}}>
      <div style={{width:30,height:30,borderRadius:"50%",background:color+"10",border:`1.5px solid ${color}35`,color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0,fontFamily:"'Inter',sans-serif"}}>{n}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:700,color:P.textChapter,lineHeight:1.7}}>{text}</div>
        {detail&&<div style={{fontSize:15,color:P.textSoft,lineHeight:2.0,marginTop:6}}>{detail}</div>}
      </div>
    </div>
  );
}

function Quote({text,color=P.vermillion}){
  return(
    <div style={{borderLeft:`3px solid ${color}40`,background:color+"06",borderRadius:"0 8px 8px 0",padding:"16px 22px",margin:"20px 0"}}>
      <span style={{fontSize:15,color:P.textSoft,lineHeight:2.0,fontStyle:"italic"}}>{text}</span>
    </div>
  );
}

function Formula({text,color=P.vermillion}){
  return(
    <div style={{textAlign:"center",padding:28,margin:"24px 0",background:P.paperLight,borderRadius:10,border:`1px solid ${color}15`,position:"relative",overflow:"hidden",boxShadow:`0 1px 6px ${P.pageShadow}`}}>
      <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,transparent,${color}04,transparent)`,backgroundSize:"200% 100%",animation:"shimmer 5s ease infinite"}}/>
      <span style={{fontSize:19,fontWeight:900,letterSpacing:3,color:P.textChapter,fontFamily:"'Noto Serif SC',serif",position:"relative",lineHeight:1.8}}>{text}</span>
    </div>
  );
}

function Expand({title,children,color=P.colors[0].hex,char}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{background:open?P.paperLight:P.paperDeep,borderRadius:8,border:`1px solid ${open?color+"20":"rgba(160,140,110,0.1)"}`,overflow:"hidden",transition:"all 0.3s",marginBottom:10,boxShadow:open?`0 2px 12px ${P.pageShadow}`:"none"}}>
      <div onClick={()=>setOpen(!open)} style={{padding:"16px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {char&&<span style={{fontSize:13,fontWeight:900,color:open?color:color+"60",fontFamily:"'ZCOOL XiaoWei',serif",border:`1px solid ${open?color+"50":color+"25"}`,width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.3s"}}>{char}</span>}
          <span style={{fontSize:16,fontWeight:open?700:500,color:open?P.textChapter:P.textSoft,letterSpacing:1,transition:"all 0.3s"}}>{title}</span>
        </div>
        <span style={{fontSize:10,color:open?color:P.textMuted,transition:"transform 0.3s",transform:open?"rotate(90deg)":"none",display:"inline-block"}}>{"▶"}</span>
      </div>
      {open&&<div style={{padding:"0 22px 20px",animation:"slideOpen 0.3s ease"}} onClick={(e)=>e.stopPropagation()}>{children}</div>}
    </div>
  );
}

function Divider({color=P.textMuted}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,margin:"32px 0",opacity:0.3}}>
      <div style={{height:1,flex:1,background:`linear-gradient(90deg,transparent,${color}30)`}}/>
      <div style={{width:3,height:3,borderRadius:"50%",background:color+"50"}}/>
      <div style={{width:40,height:1,background:color+"25"}}/>
      <div style={{width:3,height:3,borderRadius:"50%",background:color+"50"}}/>
      <div style={{height:1,flex:1,background:`linear-gradient(270deg,transparent,${color}30)`}}/>
    </div>
  );
}

function ActionBox({children}){
  return(
    <div style={{background:P.vermillion+"05",borderRadius:10,padding:24,border:`1px solid ${P.vermillion}12`,position:"relative"}}>
      <div style={{position:"absolute",top:10,right:14,opacity:0.08}}><SealIcon char="行" color={P.vermillion} size={32} glow={false}/></div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <SealIcon char="行" color={P.vermillion} size={28} glow={false}/>
        <span style={{fontSize:16,fontWeight:800,color:P.vermillion,letterSpacing:2}}>即刻行动</span>
      </div>
      {children}
    </div>
  );
}

function Insight({children,color=P.vermillion}){
  return(
    <div style={{background:`linear-gradient(135deg,${color}06,${P.paperLight})`,borderRadius:10,padding:"22px 24px",margin:"24px 0",border:`1px solid ${color}18`,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:10,right:16,fontSize:28,opacity:0.12}}>💎</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:18}}>💎</span>
        <span style={{fontSize:15,fontWeight:800,color,letterSpacing:1}}>深度洞察</span>
      </div>
      <div style={{fontSize:15,color:P.textSoft,lineHeight:2.0}}>{children}</div>
    </div>
  );
}

function TransitionCard({text,color=P.vermillion}){
  return(
    <div style={{background:`linear-gradient(135deg,${color}08,${P.paperDeep})`,borderRadius:10,padding:"20px 24px",margin:"32px 0 0",border:`1px dashed ${color}30`,position:"relative",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <span style={{fontSize:16,opacity:0.6,flexShrink:0,marginTop:2}}>📌</span>
        <p style={{fontSize:15,color:P.textSoft,lineHeight:2.0,fontStyle:"italic"}}>{text}</p>
      </div>
    </div>
  );
}

function InkFlow({steps,color=P.colors[0].hex,title}){
  const maxSteps=steps.length;
  const w=680,boxW=Math.min(130,Math.floor((680-(maxSteps-1)*20)/maxSteps)),boxH=50,gap=Math.floor((680-maxSteps*boxW)/(maxSteps-1)||20);
  const totalW=maxSteps*boxW+(maxSteps-1)*gap;
  const startX=(w-totalW)/2;
  return(
    <div style={{margin:"24px 0",background:P.paperLight,borderRadius:10,padding:"20px 8px",border:`1px solid ${color}15`,overflow:"hidden"}}>
      {title&&<div style={{fontSize:15,fontWeight:700,color,letterSpacing:2,textAlign:"center",marginBottom:14}}>{title}</div>}
      <svg width="100%" viewBox={`0 0 ${w} 80`} style={{display:"block",maxWidth:680,margin:"0 auto"}}>
        <defs>
          <filter id={`inkBlur${color.slice(1)}`}><feGaussianBlur stdDeviation="0.5"/></filter>
          <marker id={`arrow${color.slice(1)}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill={color+"80"}/></marker>
        </defs>
        {steps.map((s,i)=>{
          const x=startX+i*(boxW+gap);
          const y=(80-boxH)/2;
          const words=s.length>6?[s.slice(0,Math.ceil(s.length/2)),s.slice(Math.ceil(s.length/2))]:null;
          return(
            <g key={i}>
              <rect x={x} y={y} width={boxW} height={boxH} rx="8" fill={color+"0a"} stroke={color+"40"} strokeWidth="1.2" filter={`url(#inkBlur${color.slice(1)})`}/>
              {words?<>
                <text x={x+boxW/2} y={y+boxH/2-7} textAnchor="middle" dominantBaseline="middle" fill={P.textChapter} fontSize="12" fontFamily="'Noto Serif SC',serif" fontWeight="600">{words[0]}</text>
                <text x={x+boxW/2} y={y+boxH/2+9} textAnchor="middle" dominantBaseline="middle" fill={P.textChapter} fontSize="12" fontFamily="'Noto Serif SC',serif" fontWeight="600">{words[1]}</text>
              </>:
                <text x={x+boxW/2} y={y+boxH/2+1} textAnchor="middle" dominantBaseline="middle" fill={P.textChapter} fontSize="13" fontFamily="'Noto Serif SC',serif" fontWeight="600">{s}</text>
              }
              {i<steps.length-1&&<line x1={x+boxW+2} y1={40} x2={x+boxW+gap-2} y2={40} stroke={color+"60"} strokeWidth="1.5" strokeDasharray="4 3" markerEnd={`url(#arrow${color.slice(1)})`}/>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function InkCompare({left,right,leftTitle,rightTitle,color=P.colors[0].hex,title}){
  return(
    <div style={{margin:"24px 0",background:P.paperLight,borderRadius:10,padding:"20px 16px 16px",border:`1px solid ${color}15`}}>
      {title&&<div style={{fontSize:15,fontWeight:700,color,letterSpacing:2,textAlign:"center",marginBottom:16}}>{title}</div>}
      <div className="ink-compare-inner" style={{display:"flex",gap:16}}>
        <div style={{flex:1,flexBasis:"45%",background:color+"08",borderRadius:8,padding:16,border:`1px solid ${color}20`}}>
          <div style={{fontSize:14,fontWeight:800,color,letterSpacing:2,marginBottom:10,textAlign:"center"}}>{leftTitle}</div>
          {left.map((item,i)=><div key={i} style={{fontSize:14,color:P.textSoft,lineHeight:1.9,padding:"4px 0",borderBottom:i<left.length-1?`1px dashed ${color}15`:"none"}}>{item}</div>)}
        </div>
        <div className="ink-compare-divider" style={{width:1,background:`linear-gradient(to bottom,transparent,${color}30,transparent)`,flexShrink:0}}/>
        <div style={{flex:1,flexBasis:"45%",background:P.vermillion+"06",borderRadius:8,padding:16,border:`1px solid ${P.vermillion}15`}}>
          <div style={{fontSize:14,fontWeight:800,color:P.vermillion,letterSpacing:2,marginBottom:10,textAlign:"center"}}>{rightTitle}</div>

function Ch1(){
  const c=P.colors[0].hex;
  return(
    <div className="page-in">
      <SecTitle title="思维之眼——看见「看不见的」" sub="建立"看见看不见的"这一分析框架：破窗理论、第三个人、优秀vs糟糕经济学家" color={c} char="眼" ls={0}/>
      <LogicChain question="经济决策为什么总被误判？" color={c} items={["经济决策产生多重后果","有些后果立刻可见","有些后果延迟分散","糟糕经济学家只看第一面","优秀经济学家兼顾两面","每个事件中有「第三个人」被忽视","破窗理论是揭示一切的总纲"]}/>
      <Formula text="经济决策的真实效果 = 看得见的直接后果 + 看不见的间接后果" color={c}/>

      <InkFlow steps={["窗户被打碎","玻璃工得6法郎","店主失去6法郎消费力","鞋匠少了一笔生意","总财富并未增加"]} color={c} title="破窗理论的完整逻辑"/>

      <Card color={c} style={{marginBottom:24}}>
        <div style={{fontSize:18,fontWeight:800,color:P.textChapter,marginBottom:12,letterSpacing:2}}>深度解读：认知心理学命题</div>
        <Para>巴斯夏在这里做的，其实不是在讲经济学，而是在讲<strong>认知心理学</strong>。他揭示的是人类思维的一个系统性缺陷：我们天然地被"可见的""即时的""集中的"效果所吸引，而对"不可见的""延迟的""分散的"效果视而不见。这和现代行为经济学中丹尼尔·卡尼曼所说的"可得性偏差"异曲同工——越容易被想到的信息，越容易被高估。一个玻璃工欢天喜地拿到6法郎，所有人都看见了、都记住了；一个鞋匠少了一笔生意，没有人注意、没有人统计。</Para>
        <Para>更深层地说，巴斯夏提出了一个认识论命题：<strong>我们不仅要观察"发生了什么"，还要推理"本来会发生什么"。</strong>经济学中把这叫做"反事实推理"（counterfactual reasoning）。打碎窗户后，我们看到的现实是玻璃工赚了钱；但我们必须同时思考另一个没有发生的现实——如果窗户没碎，那6法郎会去了哪里。这种思维方式对普通人来说极其反直觉，因为我们的大脑天生不擅长思考"没有发生的事"。</Para>
        <Para>我的判断是，"第三个人"这个概念是巴斯夏最天才的发明。在破窗故事里，人们只看到两个角色——店主和玻璃工，但真正决定这个事件经济含义的是第三个角色——那个因为店主花了6法郎修窗户而失去6法郎生意的鞋匠。<strong>在所有经济政策讨论中，永远有一个沉默的第三方——他的损失是隐性的、分散的、不被统计的。</strong>这是本书最有力的思维工具。</Para>
      </Card>

      <Divider color={c}/>

      <Card color={c} style={{marginBottom:24}}>
        <div style={{fontSize:18,fontWeight:800,color:P.textChapter,marginBottom:12,letterSpacing:2}}>方法：三问法</div>
        <Step n={1} text="第一问：谁得到了好处？（看得见的受益者）" detail="辨识政策的直接受益方，这是显而易见的一面。" color={c}/>
        <Step n={2} text="第二问：谁为此买单？（看不见的付费者）" detail="追踪资金来源，找到隐性的承担者——那个沉默的纳税人。" color={c}/>
        <Step n={3} text="第三问：第三个人在哪里？（被忽视的利益相关方）" detail="如果这笔钱没有被用于当前用途，它本来会流向谁？那个人损失了什么？" color={c}/>
      </Card>

      <Divider color={c}/>

      <Card color={c} style={{marginBottom:24}}>
        <div style={{fontSize:18,fontWeight:800,color:P.textChapter,marginBottom:14,letterSpacing:2}}>三个核心案例</div>

        <CaseStory title="案例一：破窗与玻璃工的6法郎" color={c} icon="🪟">
          <p style={{marginBottom:10}}><strong>场景：</strong>店主詹姆斯先生的儿子打碎了一块价值6法郎的窗户玻璃。围观者纷纷安慰："这不是坏事，玻璃工能因此赚到6法郎，他再去消费别的，最终刺激了整个经济。"</p>
          <p style={{marginBottom:10}}><strong>冲突：</strong>这种"破坏有益论"看似合理——金钱确实流动了，玻璃工确实得到了工作。但这只是事物的一面。</p>
          <p style={{marginBottom:10}}><strong>转折：</strong>巴斯夏追问——如果窗户没碎，詹姆斯先生本可以用这6法郎买一双新鞋或一本书。玻璃工得到的，正是鞋匠或书商失去的。</p>
          <p><strong>结果：</strong>第一种情况（窗户碎了）：詹姆斯有一面窗户。第二种情况（窗户没碎）：詹姆斯有一面窗户+一双鞋。社会净损失 = 一双鞋的价值。<strong>"破坏并不是有利可图的。"</strong></p>
        </CaseStory>

        <CaseStory title="案例二：优秀经济学家与糟糕经济学家" color={c} icon="🎓">
          <p style={{marginBottom:10}}><strong>场景：</strong>巴斯夏在原序中提出一个判断标准——区分优秀经济学家和糟糕经济学家。</p>
          <p style={{marginBottom:10}}><strong>冲突：</strong>糟糕经济学家只看到经济政策实行后"眼前的好果子"，却对"后面可能产生的巨大弊端不管不顾"；优秀经济学家"宁愿背负眼前的小小困难而追求未来的较大的收益"。</p>
          <p style={{marginBottom:10}}><strong>转折：</strong>巴斯夏用一个类比说明——就像一个婴儿只能根据眼前后果来调整行动，而成年人应该有"远见"。教训（经验主义）是残酷的老师，远见（理性推理）是温和的老师。</p>
          <p><strong>结果：</strong>这个区分标准本身就是全书的方法论——你是只看"看得见的"就急于表态的糟糕评论家，还是能耐心追问"看不见的"那一面的真正思考者？</p>
        </CaseStory>

        <CaseStory title="案例三：火烧巴黎的「独创精神」" color={c} icon="🔥">
          <p style={{marginBottom:10}}><strong>场景：</strong>巴斯夏提到查曼斯子爵曾经"精确地计算过"——如果烧毁整个巴黎，将有多少房子要重建，会带来多少生意。</p>
          <p style={{marginBottom:10}}><strong>冲突：</strong>这种论证方式在逻辑上与安慰店主的围观者完全一致——把破坏视为经济刺激。</p>
          <p style={{marginBottom:10}}><strong>转折：</strong>巴斯夏讽刺道："我很抱歉破坏了人家富于独创精神的计算"——如果破坏真能创造财富，那把整个国家都烧了岂不是最好的经济政策？</p>
          <p><strong>结果：</strong>将错误逻辑推到极端（归谬法），荒谬性不言自明。这也是巴斯夏最擅长的论证手法。</p>
        </CaseStory>
      </Card>

      <Insight color={c}>
        <p style={{marginBottom:12}}>巴斯夏的破窗理论，本质上是一个<strong>注意力经济学</strong>的命题。政策的受益者总是少数人、集中的、可见的，因此他们有动力游说和造势；而政策的受害者往往是多数人、分散的、不自知的，因此他们沉默。这解释了为什么坏政策总是比好政策更容易通过——因为它的"看得见的"好处足以打动投票者，而"看不见的"代价分散在每个纳税人头上，每人只损失几分钱，没人在乎。现代公共选择理论（布坎南、图洛克）后来将这种现象称为"集中收益、分散成本"（concentrated benefits, diffuse costs），而巴斯夏在170年前就已经把这个逻辑讲透了。</p>
        <p><strong>但这里有一个盲区：</strong>巴斯夏假设"看不见的"效果和"看得见的"效果在数量上总是等价的——政府多花一法郎，纳税人就少花一法郎，总量不变。但现实中，政府支出有时确实能产生"乘数效应"（凯恩斯后来的论证），尤其是在经济衰退、私人部门不愿消费和投资时。巴斯夏的框架在"常态"经济中是强有力的，但在极端情况下可能需要补充。</p>
      </Insight>

      <Divider color={c}/>

      <ActionBox>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:700,color:P.textChapter,marginBottom:6}}>「破窗三问」练习法</div>

          <div style={{fontSize:14,color:P.textSoft,lineHeight:1.9}}><strong style={{color:c}}>15分钟版：</strong>"政策双面账"——画一张两栏表格，左栏写"看得见的"效果（直接、即时、集中），右栏写"看不见的"效果（间接、延迟、分散）。对同一政策填满两栏后，再做判断。坚持一周，你会发现自己看新闻的方式彻底改变。</div>
        </div>
      </ActionBox>

      <TransitionCard color={c} text="模块一建立了思维工具，但工具的价值在于应用。接下来，我们把这把"思维手术刀"对准最大的靶子——政府的钱袋子。"/>
    </div>
  );
}

        <Para>巴斯夏在贸易管制一章中讲了一个精彩的寓言：贸易保护主义先生发现比利时铁比自己的便宜，于是想去边境用武力阻止法国人购买便宜铁。他很快发现自己打不过所有人，于是灵机一动——跑到"巴黎的法律工厂"请求通过一条禁令。<strong>从此，国家的2万名税务官替代了他一个人的暴力，效果相同，但披上了"合法"的外衣。</strong>这个寓言的杀伤力在于：它把保护主义还原为本质——一种由法律背书的强制力，强迫消费者多付钱给特定的生产者。</Para>

        <Para>我的判断是，巴斯夏对保护主义的批判在逻辑上是无懈可击的。但他的盲区在于：他没有认真讨论"幼稚产业"论证——一个新兴产业在起步阶段可能需要暂时的保护，否则会被成熟的外国竞争者扼杀在摇篮里。日本、韩国和中国的经济崛起，在某种程度上确实受益于选择性的产业保护政策。巴斯夏把所有保护都视为"掠夺"，这在19世纪已经工业化的英法之间或许成立，但在发达国家与发展中国家之间的关系中就需要更审慎的讨论了。</Para>

      <Insight color={c}>
        <p style={{marginBottom:12}}>巴斯夏对保护主义最深刻的洞察不是经济层面的，而是道德层面的：<strong>保护主义的本质是用法律的外衣让掠夺变得"文明"。</strong>一个人在边境用枪逼你多付5法郎买铁，这叫抢劫；但如果他让议会通过一条法律达到同样效果，这就变成了"保护国内产业"。行为一模一样，只是换了执行者和称谓。这个洞察在今天仍然有效——每一项关税、配额、行业准入限制背后，都有一个"贸易保护主义先生"在受益，而买单的是每一个消费者和纳税人。</p>

        </CaseStory>

        <CaseStory title="案例三：蒙多与阿里斯特——10年之后" color={c} icon="⚖️">
          <p style={{marginBottom:10}}><strong>场景：</strong>蒙多和阿里斯特兄弟各继承5万法郎年收入。蒙多挥霍无度——"一年之内几次更换家具，每月都换一辆新马车"，被人赞为"法兰西的拯救天使"。阿里斯特精打细算——个人生活2万，慈善1万，帮朋友1万，储蓄投资1万，被人讥讽为"守财奴"。</p>
          <p style={{marginBottom:10}}><strong>冲突：</strong>公众只看到蒙多"让钱转起来了"（看得见的），却看不到阿里斯特的钱同样在流动——只是通过更迂回、更有效的路径。</p>
          <p style={{marginBottom:10}}><strong>转折：</strong>巴斯夏逐项证明——阿里斯特储蓄的1万法郎不会埋在花园里，它会变成银行贷款、企业投资、政府债券，最终全部进入经济循环。"储蓄也是支出"——区别只在于"由阿里斯特本人花，还是别人代替他来花"。</p>
          <p><strong>结果：</strong>10年后，蒙多破产了，"他不再是店主和商人们的乐趣所在"；阿里斯特不仅继续将全部收入投入周转，而且每年为社会贡献的资金还在增加，雇佣的工人越来越多。<strong>"从道德上讲，节俭是要优越于奢侈的……从经济角度来看，节俭也同样具有优越性。"</strong></p>
        </CaseStory>
      </Card>

      <Insight color={c}>
        <p style={{marginBottom:12}}>巴斯夏的"储蓄也是支出"命题，在170年后的今天依然被大量误解。人们直觉上把经济分为"花钱"（有利于经济）和"存钱"（不利于经济），却不知道<strong>你在银行里的每一分存款，都在通过银行贷款的形式变成了别人的创业资金、房贷、生产投入。</strong>你不花它，不等于它不在流动——它只是换了一条路径在流动。现代金融体系的本质就是把"不花的钱"转化为"投资的钱"。巴斯夏在没有宏观经济学框架的年代，已经把这个逻辑讲透了。</p>
        <p style={{marginBottom:12}}><strong>但我必须指出一个他完全没有预见到的情况：</strong>当储蓄不是通过投资流入实体经济，而是被用于金融投机（如2008年次贷危机前的衍生品泡沫），"储蓄也是支出"这个等式就会失灵。储蓄→投机→泡沫→崩溃的链条，是巴斯夏时代不存在的现象。</p>
        <p>此外，凯恩斯后来提出的"节俭悖论"——如果所有人同时增加储蓄、减少消费，可能导致总需求崩溃——也是对巴斯夏论证的有效补充。<strong>巴斯夏的论证在"正常经济"中成立，但在极端情况下需要修正。</strong></p>
      </Insight>
