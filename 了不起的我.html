<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆卷 · 了不起的我</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=ZCOOL+XiaoWei&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0e8;font-family:'Noto Serif SC','PingFang SC',Georgia,serif;color:#2c2418;overflow-x:hidden}
  html{scroll-behavior:smooth}
  ::selection{background:rgba(180,120,60,0.2)}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#ebe5d8}
  ::-webkit-scrollbar-thumb{background:rgba(140,110,70,0.3);border-radius:3px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glowPulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  @keyframes slideOpen{from{max-height:0;opacity:0}to{max-height:6000px;opacity:1}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes pageIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
  @keyframes inkDraw{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}
  .fade-up{animation:fadeUp 0.4s ease both}
  .page-in{animation:pageIn 0.35s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const useState = React.useState;

const P={
  paper:"#f5f0e8",paperDeep:"#efe9dd",paperLight:"#faf7f0",
  pageShadow:"rgba(120,100,70,0.06)",
  text:"#2c2418",textSoft:"#6a5d4e",textMuted:"#a89a88",textChapter:"#4a3f30",
  vermillion:"#c85030",
  colors:[
    {name:"赭石",hex:"#a87a28",glow:"rgba(168,122,40,0.12)",char:"行",desc:"行为改变"},
    {name:"花青",hex:"#3a7090",glow:"rgba(58,112,144,0.12)",char:"思",desc:"思维进化"},
    {name:"石青",hex:"#3a8a6a",glow:"rgba(58,138,106,0.12)",char:"系",desc:"关系发展"},
    {name:"胭脂",hex:"#a84a58",glow:"rgba(168,74,88,0.12)",char:"转",desc:"转折重生"},
    {name:"藤黄",hex:"#b89a28",glow:"rgba(184,154,40,0.12)",char:"图",desc:"人生地图"},
  ],
};

function PaperBg(){
  return(
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none"}}>
      <svg width="100%" height="100%" style={{position:"absolute",inset:0,opacity:0.035}}>
        <defs><filter id="pf"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="8"/><feColorMatrix type="saturate" values="0"/></filter></defs>
        <rect width="100%" height="100%" fill="#a09070" filter="url(#pf)"/>
      </svg>
      <svg width="100%" height="100%" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" style={{position:"absolute",inset:0,opacity:0.03}}>
        <defs><filter id="ms"><feGaussianBlur stdDeviation="18"/></filter></defs>
        <path d="M-50 580 Q200 460 400 510 Q600 420 800 480 Q1000 400 1200 460 Q1400 430 1450 470 L1450 900 L-50 900Z" fill="#a09080" opacity="0.5" filter="url(#ms)"/>
      </svg>
    </div>
  );
}

function SealIcon({char="拆",color=P.vermillion,size=48,glow=true}){
  const[h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{width:size,height:size,position:"relative",flexShrink:0,cursor:"default"}}>
      <div style={{position:"absolute",inset:-4,borderRadius:"50%",background:`radial-gradient(circle,${color}${h?"15":"08"} 0%,transparent 70%)`,transition:"all 0.5s",animation:glow?"glowPulse 3s ease infinite":"none",filter:"blur(3px)"}}/>
      <div style={{position:"absolute",inset:0,border:`1.5px solid ${h?color:color+"60"}`,borderRadius:5,transform:"rotate(-3deg)",transition:"all 0.4s",boxShadow:h?`0 0 14px ${color}20`:"none"}}/>
      <div style={{position:"absolute",inset:3,border:`1px solid ${h?color+"50":color+"25"}`,borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.4s"}}/>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",transform:"rotate(-3deg)"}}>
        <span style={{fontSize:size*0.42,fontWeight:900,color,fontFamily:"'ZCOOL XiaoWei','Noto Serif SC',serif",textShadow:h?`0 0 12px ${color}30`:`0 0 6px ${color}10`,transition:"all 0.4s"}}>{char}</span>
      </div>
    </div>
  );
}

function MiniLandscape({color=P.colors[0].hex,size=44,variant=0}){
  const v=variant%4;
  return(
    <svg width={size} height={size} viewBox="0 0 52 52" style={{flexShrink:0,opacity:0.85}}>
      {v===0&&<g><path d="M4 38 Q14 12 26 28 Q34 10 48 34 L48 48 L4 48Z" fill={color+"15"} stroke={color+"40"} strokeWidth="0.8"/><path d="M0 42 Q12 28 24 38 Q36 24 52 36 L52 52 L0 52Z" fill={color+"20"} stroke={color+"50"} strokeWidth="0.8"/></g>}
      {v===1&&<g><line x1="20" y1="48" x2="18" y2="6" stroke={color+"50"} strokeWidth="1.5" strokeLinecap="round"/><path d="M18 12 Q10 8 6 14" fill="none" stroke={color+"40"} strokeWidth="1" strokeLinecap="round"/><path d="M18 20 Q12 16 8 22" fill="none" stroke={color+"35"} strokeWidth="1" strokeLinecap="round"/><path d="M18 28 Q24 24 28 30" fill="none" stroke={color+"40"} strokeWidth="1" strokeLinecap="round"/></g>}
      {v===2&&<g><path d="M4 22 Q14 16 26 22 Q38 28 48 22" fill="none" stroke={color+"45"} strokeWidth="1" strokeLinecap="round"/><path d="M8 30 Q18 24 30 30 Q42 36 48 30" fill="none" stroke={color+"35"} strokeWidth="0.8" strokeLinecap="round"/><path d="M4 38 Q14 32 26 38 Q38 44 48 38" fill="none" stroke={color+"25"} strokeWidth="0.6" strokeLinecap="round"/></g>}
      {v===3&&<g><ellipse cx="26" cy="30" rx="20" ry="8" fill={color+"08"} stroke={color+"20"} strokeWidth="0.5"/><ellipse cx="18" cy="26" rx="10" ry="5" fill={color+"0c"} stroke={color+"28"} strokeWidth="0.5"/><path d="M10 20 Q16 8 26 14 Q36 6 44 16" fill="none" stroke={color+"30"} strokeWidth="0.7" strokeLinecap="round"/></g>}
    </svg>
  );
}

function ReadBar({progress}){
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,height:2,zIndex:100,background:"rgba(160,140,110,0.1)"}}>
      <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${P.vermillion}60,${P.vermillion})`,transition:"width 0.3s ease",borderRadius:"0 1px 1px 0"}}/>
    </div>
  );
}

function ChTab({label,char,color,active,onClick,isOverview}){
  return(
    <button onClick={onClick} style={{
      padding:"10px 14px",border:"none",display:"flex",alignItems:"center",gap:6,
      background:active?P.paperLight:"transparent",
      borderBottom:active?`2px solid ${color}`:"2px solid transparent",
      borderRight:isOverview?"1px solid rgba(160,140,110,0.15)":"none",
      color:active?P.textChapter:P.textMuted,fontSize:13,fontWeight:active?700:400,
      letterSpacing:active?1.5:0.5,cursor:"pointer",transition:"all 0.3s",
      fontFamily:"'Noto Serif SC',serif",whiteSpace:"nowrap",flexShrink:0,
    }}>
      {char&&<span style={{fontSize:10,fontWeight:900,fontFamily:"'ZCOOL XiaoWei',serif",border:`1px solid ${active?color+"60":color+"25"}`,color:active?color:color+"60",width:18,height:18,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.3s",background:active?color+"08":"transparent"}}>{char}</span>}
      {label}
    </button>
  );
}

function Sidebar({chapters,current,onSelect,open,onClose}){
  const isNarrow=typeof window!=="undefined"&&window.innerWidth<=480;
  const sidebarWidth=isNarrow?"min(82vw,300px)":300;
  return(
    <div>
      {open&&<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(60,50,30,0.28)",backdropFilter:"blur(2px)",zIndex:98}}/>}
      <div style={{position:"fixed",top:0,left:open?0:`calc(-1 * ${sidebarWidth})`,width:sidebarWidth,height:"100vh",background:P.paperDeep,borderRight:`1px solid rgba(160,140,110,0.15)`,boxShadow:open?"8px 0 36px rgba(80,60,30,0.14)":"none",zIndex:99,transition:"left 0.35s cubic-bezier(.4,0,.2,1)",padding:"32px 0 max(24px, env(safe-area-inset-bottom))",overflowY:"auto"}}>
        <div style={{padding:"0 24px 24px",borderBottom:`1px solid rgba(160,140,110,0.12)`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <SealIcon char="目" color={P.vermillion} size={28} glow={false}/>
            <span style={{fontSize:16,fontWeight:700,color:P.textChapter,letterSpacing:3}}>目录</span>
          </div>
        </div>
        {chapters.map((ch,i)=>(
          <div key={i} onClick={()=>{onSelect(i);onClose();}} style={{padding:"14px 24px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:current===i?ch.color+"08":"transparent",borderLeft:current===i?`3px solid ${ch.color}`:"3px solid transparent",transition:"all 0.25s"}}>
            <span style={{fontSize:11,fontWeight:900,fontFamily:"'ZCOOL XiaoWei',serif",color:current===i?ch.color:P.textMuted,border:`1px solid ${current===i?ch.color+"50":P.textMuted+"30"}`,width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)"}}>{ch.char}</span>
            <span style={{fontSize:14,color:current===i?P.textChapter:P.textSoft,fontWeight:current===i?600:400}}>{ch.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function PageNav({current,total,name,onPrev,onNext}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 0",borderTop:`1px solid rgba(160,140,110,0.15)`,marginTop:40}}>
      <button onClick={current>0?onPrev:undefined} style={{padding:"10px 20px",border:current>0?"1px solid rgba(160,140,110,0.25)":"1px solid transparent",borderRadius:6,background:current>0?P.paperLight:"transparent",color:current>0?P.textSoft:"transparent",fontSize:14,cursor:current>0?"pointer":"default",fontFamily:"'Noto Serif SC',serif"}}>{"← 上一章"}</button>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:12,color:P.textMuted,letterSpacing:2}}>{name}</div>
        <div style={{fontSize:11,color:P.textMuted,marginTop:2}}>{current+1} / {total}</div>
      </div>
      <button onClick={current<total-1?onNext:undefined} style={{padding:"10px 20px",border:current<total-1?"1px solid rgba(160,140,110,0.25)":"1px solid transparent",borderRadius:6,background:current<total-1?P.paperLight:"transparent",color:current<total-1?P.textSoft:"transparent",fontSize:14,cursor:current<total-1?"pointer":"default",fontFamily:"'Noto Serif SC',serif"}}>{"下一章 →"}</button>
    </div>
  );
}

function SecTitle({title,sub,color=P.colors[0].hex,char,ls=0}){
  return(
    <div style={{marginBottom:32,paddingTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
        <SealIcon char={char} color={color} size={44} glow={false}/>
        <div style={{opacity:0.3,marginLeft:-28,marginTop:14}}><MiniLandscape color={color} size={32} variant={ls}/></div>
        <h2 style={{fontSize:26,fontWeight:900,letterSpacing:4,color:P.textChapter,fontFamily:"'Noto Serif SC',serif",lineHeight:1.4}}>{title}</h2>
      </div>
      {sub&&<p style={{fontSize:15,color:P.textSoft,lineHeight:1.9,borderLeft:`2px solid ${color}30`,paddingLeft:16,marginLeft:2}}>{sub}</p>}
      <div style={{height:1,background:`linear-gradient(90deg,${color}40,transparent 60%)`,marginTop:16}}/>
    </div>
  );
}

function Card({children,color=P.colors[0].hex,style={}}){
  const[h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:P.paperLight,borderRadius:10,padding:28,borderLeft:`3px solid ${h?color:color+"50"}`,boxShadow:h?`0 4px 24px ${P.pageShadow},0 0 20px ${color}08`:`0 1px 8px ${P.pageShadow}`,transition:"all 0.35s ease",transform:h?"translateY(-2px)":"none",position:"relative",overflow:"hidden",...style}}>
      {children}
    </div>
  );
}

function Para({children}){
  return <p style={{fontSize:16,color:P.text,lineHeight:2.0,marginBottom:16,textAlign:"justify"}}>{children}</p>;
}

function Step({n,text,detail,color=P.colors[1].hex}){
  return(
    <div style={{display:"flex",gap:16,marginBottom:20,alignItems:"flex-start"}}>
      <div style={{width:30,height:30,borderRadius:"50%",background:color+"10",border:`1.5px solid ${color}35`,color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0,fontFamily:"'Inter',sans-serif"}}>{n}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:16,fontWeight:700,color:P.textChapter,lineHeight:1.7}}>{text}</div>
        {detail&&<div style={{fontSize:15,color:P.textSoft,lineHeight:2.0,marginTop:6}}>{detail}</div>}
      </div>
    </div>
  );
}

function Quote({text,color=P.vermillion}){
  return(
    <div style={{borderLeft:`3px solid ${color}40`,background:color+"06",borderRadius:"0 8px 8px 0",padding:"16px 22px",margin:"20px 0"}}>
      <span style={{fontSize:15,color:P.textSoft,lineHeight:2.0,fontStyle:"italic"}}>{text}</span>
    </div>
  );
}

function Formula({text,color=P.vermillion}){
  return(
    <div style={{textAlign:"center",padding:28,margin:"24px 0",background:P.paperLight,borderRadius:10,border:`1px solid ${color}15`,position:"relative",overflow:"hidden",boxShadow:`0 1px 6px ${P.pageShadow}`}}>
      <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,transparent,${color}04,transparent)`,backgroundSize:"200% 100%",animation:"shimmer 5s ease infinite"}}/>
      <span style={{fontSize:22,fontWeight:900,letterSpacing:5,color:P.textChapter,fontFamily:"'Noto Serif SC',serif",position:"relative"}}>{text}</span>
    </div>
  );
}

function Expand({title,children,color=P.colors[0].hex,char}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{background:open?P.paperLight:P.paperDeep,borderRadius:8,border:`1px solid ${open?color+"20":"rgba(160,140,110,0.1)"}`,overflow:"hidden",transition:"all 0.3s",marginBottom:10,boxShadow:open?`0 2px 12px ${P.pageShadow}`:"none"}}>
      <div onClick={()=>setOpen(!open)} style={{padding:"16px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {char&&<span style={{fontSize:13,fontWeight:900,color:open?color:color+"60",fontFamily:"'ZCOOL XiaoWei',serif",border:`1px solid ${open?color+"50":color+"25"}`,width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center",borderRadius:3,transform:"rotate(-3deg)",transition:"all 0.3s"}}>{char}</span>}
          <span style={{fontSize:16,fontWeight:open?700:500,color:open?P.textChapter:P.textSoft,letterSpacing:1,transition:"all 0.3s"}}>{title}</span>
        </div>
        <span style={{fontSize:10,color:open?color:P.textMuted,transition:"transform 0.3s",transform:open?"rotate(90deg)":"none",display:"inline-block"}}>{"▶"}</span>
      </div>
      {open&&<div style={{padding:"0 22px 20px",animation:"slideOpen 0.3s ease"}} onClick={(e)=>e.stopPropagation()}>{children}</div>}
    </div>
  );
}

function Divider({color=P.textMuted}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,margin:"32px 0",opacity:0.3}}>
      <div style={{height:1,flex:1,background:`linear-gradient(90deg,transparent,${color}30)`}}/>
      <div style={{width:3,height:3,borderRadius:"50%",background:color+"50"}}/>
      <div style={{width:40,height:1,background:color+"25"}}/>
      <div style={{width:3,height:3,borderRadius:"50%",background:color+"50"}}/>
      <div style={{height:1,flex:1,background:`linear-gradient(270deg,transparent,${color}30)`}}/>
    </div>
  );
}

function ActionBox({children,char="行"}){
  return(
    <div style={{background:P.vermillion+"05",borderRadius:10,padding:24,border:`1px solid ${P.vermillion}12`,position:"relative"}}>
      <div style={{position:"absolute",top:10,right:14,opacity:0.1}}><SealIcon char={char} color={P.vermillion} size={32} glow={false}/></div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <SealIcon char={char} color={P.vermillion} size={28} glow={false}/>
        <span style={{fontSize:16,fontWeight:800,color:P.vermillion,letterSpacing:2}}>即刻行动</span>
      </div>
      {children}
    </div>
  );
}

/* ===== NEW: SVG Diagram Components (Water-ink Style) ===== */

function InkFlow({steps,color=P.colors[0].hex,title}){
  const w=680,h=steps.length>4?140:120,boxW=130,boxH=48,gap=20;
  const totalW=steps.length*boxW+(steps.length-1)*gap;
  const startX=(w-totalW)/2;
  return(
    <div style={{margin:"24px 0",background:P.paperLight,borderRadius:10,padding:"20px 12px",border:`1px solid ${color}15`,overflow:"hidden"}}>
      {title&&<div style={{fontSize:15,fontWeight:700,color,letterSpacing:2,textAlign:"center",marginBottom:14}}>{title}</div>}
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{display:"block",maxWidth:680,margin:"0 auto"}}>
        <defs>
          <filter id="inkBlur"><feGaussianBlur stdDeviation="0.5"/></filter>
          <marker id={`arrow-${color.slice(1)}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d={`M0,0 L8,3 L0,6`} fill={color+"80"}/></marker>
        </defs>
        {steps.map((s,i)=>{
          const x=startX+i*(boxW+gap);
          const y=(h-boxH)/2;
          return(
            <g key={i}>
              <rect x={x} y={y} width={boxW} height={boxH} rx="8" fill={color+"0a"} stroke={color+"40"} strokeWidth="1.2" filter="url(#inkBlur)"/>
              <text x={x+boxW/2} y={y+boxH/2+1} textAnchor="middle" dominantBaseline="middle" fill={P.textChapter} fontSize="13" fontFamily="'Noto Serif SC',serif" fontWeight="600">{s}</text>
              {i<steps.length-1&&<line x1={x+boxW+2} y1={h/2} x2={x+boxW+gap-2} y2={h/2} stroke={color+"60"} strokeWidth="1.5" strokeDasharray="4 3" markerEnd={`url(#arrow-${color.slice(1)})`}/>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function InkCompare({left,right,leftTitle,rightTitle,color=P.colors[0].hex,title}){
  return(
    <div style={{margin:"24px 0",background:P.paperLight,borderRadius:10,padding:"20px 20px 16px",border:`1px solid ${color}15`}}>
      {title&&<div style={{fontSize:15,fontWeight:700,color,letterSpacing:2,textAlign:"center",marginBottom:16}}>{title}</div>}
      <div style={{display:"flex",gap:16}}>
        <div style={{flex:1,background:color+"08",borderRadius:8,padding:16,border:`1px solid ${color}20`}}>
          <div style={{fontSize:14,fontWeight:800,color,letterSpacing:2,marginBottom:10,textAlign:"center"}}>{leftTitle}</div>
          {left.map((item,i)=><div key={i} style={{fontSize:14,color:P.textSoft,lineHeight:1.9,padding:"4px 0",borderBottom:i<left.length-1?`1px dashed ${color}15`:"none"}}>{item}</div>)}
        </div>
        <div style={{width:1,background:`linear-gradient(to bottom,transparent,${color}30,transparent)`,flexShrink:0}}/>
        <div style={{flex:1,background:P.vermillion+"06",borderRadius:8,padding:16,border:`1px solid ${P.vermillion}15`}}>
          <div style={{fontSize:14,fontWeight:800,color:P.vermillion,letterSpacing:2,marginBottom:10,textAlign:"center"}}>{rightTitle}</div>
          {right.map((item,i)=><div key={i} style={{fontSize:14,color:P.textSoft,lineHeight:1.9,padding:"4px 0",borderBottom:i<right.length-1?`1px dashed ${P.vermillion}12`:"none"}}>{item}</div>)}
        </div>
      </div>
    </div>
  );
}

function InkStructure({items,color=P.colors[0].hex,title,cols=4}){
  return(
    <div style={{margin:"24px 0",background:P.paperLight,borderRadius:10,padding:"20px 16px",border:`1px solid ${color}15`}}>
      {title&&<div style={{fontSize:15,fontWeight:700,color,letterSpacing:2,textAlign:"center",marginBottom:16}}>{title}</div>}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:10}}>
        {items.map((item,i)=>(
          <div key={i} style={{background:color+"08",borderRadius:8,padding:"14px 10px",textAlign:"center",border:`1px solid ${color}18`,position:"relative"}}>
            <div style={{fontSize:20,fontWeight:900,color:color+"30",fontFamily:"'Inter',sans-serif",marginBottom:4}}>{i+1}</div>
            <div style={{fontSize:13,fontWeight:700,color:P.textChapter,marginBottom:4}}>{item.title}</div>
            <div style={{fontSize:12,color:P.textSoft,lineHeight:1.7}}>{item.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CaseStory({title,children,color=P.colors[0].hex,icon="📖"}){
  return(
    <div style={{margin:"20px 0",background:`linear-gradient(135deg,${color}06,${P.paperLight})`,borderRadius:10,padding:"22px 24px",border:`1px solid ${color}18`,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:12,right:16,fontSize:32,opacity:0.08}}>{icon}</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{width:4,height:20,borderRadius:2,background:color}}/>
        <span style={{fontSize:15,fontWeight:800,color:P.textChapter,letterSpacing:1}}>{title}</span>
      </div>
      <div style={{fontSize:15,color:P.textSoft,lineHeight:2.0}}>{children}</div>
    </div>
  );
}

        </CaseStory>

        <Quote text="心理舒适区不一定舒适，但一定熟悉。我们会用自己的应对方式去建构生活，而不是根据生活选择合适的应对方式。" color={c}/>

          <p style={{marginBottom:10}}>用X光片分析：<strong>第一栏</strong>——行为目标：更自信地表达自己。<strong>第二栏</strong>——相反行为：经常沉默，等别人先发言然后附和"对对对"；如果不同意也不直说；说话很小声，以至于大家听不清。</p>

        <Step n={3} text="创造支持新行为的社交环境" detail="加入一个学习小组或跑步俱乐部，让社交环境成为你改变的'场'。" color={c}/>

      <Expand title="情感触发：让改变自然发生" color={c} char="情">

        <CaseStory title="案例：大城市里孤独的暴食者" color={c}>

        <Quote text="人生已经很艰难了，你也不需要完全否定旧方法。最重要的是找一个更健康的替代方式。" color={c}/>

      <Expand title="第二序列改变：有效与无效的改变" color={c} char="辨">
        <Para>改变分两种：第一序列改变——在系统内部做调整（换工作、换城市）；第二序列改变——改变系统本身的规则（改变你看待工作的方式）。无效的改变往往是第一序列的：你不停换工作，但每份都做不长久，因为底层思维模式没变。</Para>

        <Para>判断标准很简单：你的改变是改善了状况，还是维持甚至加剧了症状？如果形成了恶性循环——比如失眠的人越想改变失眠就越清醒——那就是无效的改变，你需要的是第二序列改变：接纳。</Para>
      </Expand>

      <Divider color={c}/>

      <ActionBox>
        <Para>现在请你思考：你最想改变的一件事是什么？用心理免疫X光片做一次自我检查——写下你的改变目标、相反行为、隐藏好处和核心假设。然后找到你能迈出的最小一步，今天就去做。</Para>

        <InkCompare

        <Para>斯多葛哲学家爱比克泰德将世界分为两部分：你能控制的，和你不能控制的。烦恼的根源是我们总想控制不能控制的事情。</Para>

          <p style={{marginBottom:10}}>陈海贤帮他做了"控制两分法"分析。不可控的：审稿人的意见、期刊的接受率、导师的态度。可控的：实验设计的严谨性、数据分析的质量、论文写作的水平、投稿的期刊选择。</p>
          <p>当他把注意力从"刷邮箱等结果"转移到"把当前实验做到最好"上时，焦虑大幅减少，反而效率提高了。匿名戒酒者协会的"一次一天"也是这个原理——不要想你要戒酒一辈子，只承诺这24小时不喝酒就好。</p>
        </CaseStory>

        <Quote text="上帝，请赐予我平静，去接受我无法改变的；给予我勇气，去改变我能改变的；赐我智慧，分辨这两者的区别。" color={c}/>
      </Expand>

      <Divider color={c}/>

      <ActionBox>
        <Para>在接下来一周里，每当你感到焦虑或自责时，停下来做三件事：第一，识别这是僵固思维、应该思维还是绝对化思维在作祟？第二，用控制两分法区分可控与不可控。第三，问自己：我真正想创造的东西是什么？</Para>
      </ActionBox>
    </div>
  );
}

      </ActionBox>
    </div>

}

function ScrollTop(){
  const[show,setShow]=useState(false);
  React.useEffect(()=>{
    const h=()=>setShow(window.scrollY>600);
    window.addEventListener("scroll",h);
    return()=>window.removeEventListener("scroll",h);
  },[]);
  if(!show)return null;
  return(
    <button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})} style={{
      position:"fixed",bottom:24,right:20,zIndex:50,
      width:40,height:40,borderRadius:20,border:"none",
      background:"rgba(160,140,110,0.15)",backdropFilter:"blur(8px)",
      color:"#8a7a60",fontSize:18,cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",
      boxShadow:"0 2px 8px rgba(0,0,0,0.08)",
      transition:"all .3s",
    }}>↑</button>
  );
}
