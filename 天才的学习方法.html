<head>

<style>

  body { font-family: -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

// ===== DATA =====
const TABS = [
  { id: "brain", label: "大脑机制", icon: "🧬" },
  { id: "system", label: "学习系统", icon: "⚙️" },

  { id: "traps", label: "避坑指南", icon: "🚨" },
  { id: "energy", label: "续航引擎", icon: "⚡" },
  { id: "cases", label: "实战案例", icon: "📋" },
];

const Pill = ({ children, color = "#FF6B35", active, onClick }) => (
  <button onClick={onClick} style={{
    padding: "6px 14px", borderRadius: 20,
    border: `1.5px solid ${active ? color : "#e0e0e0"}`,
    background: active ? `${color}12` : "#fff",
    color: active ? color : "#999", fontSize: 12, fontWeight: active ? 700 : 500,
    cursor: "pointer", transition: "all .25s", whiteSpace: "nowrap",
  }}>{children}</button>
);

const Card = ({ children, color = "#f5f5f5", border, pad = 20, radius = 16, style = {} }) => (
  <div style={{
    background: color, borderRadius: radius, padding: pad,
    border: border || "1px solid rgba(0,0,0,0.04)",

);

const Tag = ({ children, color }) => (
  <span style={{
    fontSize: 10, fontWeight: 700, color, background: `${color}15`,
    padding: "2px 8px", borderRadius: 6, letterSpacing: 0.5,
  }}>{children}</span>
);

const SectionTitle = ({ icon, title, sub }) => (
  <div style={{ marginBottom: 24 }}>
    <h3 style={{ fontSize: 20, fontWeight: 900, color: "#1a1a2e", margin: "0 0 6px", fontFamily: "'Noto Serif SC', serif" }}>
      {icon} {title}
    </h3>
    {sub && <p style={{ color: "#999", fontSize: 13, margin: 0, lineHeight: 1.6 }}>{sub}</p>}

const Insight = ({ text, color = "#FF6B35" }) => (
  <div style={{
    background: `${color}08`, borderLeft: `3px solid ${color}`,
    borderRadius: "0 10px 10px 0", padding: "10px 14px", marginTop: 12,

    <div style={{
      width: 22, height: 22, borderRadius: "50%", flexShrink: 0,

// ===================== BRAIN SECTION =====================
function BrainSection() {
  const [phase, setPhase] = useState(0);
  const phases = [
    {
      title: "感觉记忆", subtitle: "0.25~4秒", color: "#FF6B35", icon: "👁️",

      keyData: [
        "视觉信息在感觉记忆中只停留约 0.25 秒",
        "听觉信息稍长，但也不超过 4 秒",
        "绝大部分信息在此阶段就被永久丢弃",
      ],
      action: "必须在这一瞬间通过「选择性注意」捕获目标信息，否则永远丢失。",
      practicalTip: "学习时消除一切干扰源（手机静音、关闭无关网页），因为每一次分心都意味着感觉记忆中的学习信息被其他信息覆盖。",
    },
    {
      title: "工作记忆", subtitle: "容量≈7±2", color: "#4ECDC4", icon: "🔄",

      mechanism: "通过注意力筛选的信息进入工作记忆——大脑的'中央处理器'。它有两个关键限制：容量极小（约7±2个信息组块）和时间极短（不复述则20-30秒消失）。信息在此通过'复述循环'不断被重复，才有机会进入下一阶段。",
      keyData: [
        "容量只有约 7±2 个信息组块（米勒定律）",
        "不复述的话，信息在 20~30 秒内消失",
        "首因效应：序列开头的元素记得最牢",
        "近因效应：序列末尾的元素也相对容易记住",
        "所有人的工作记忆容量基本相同——差距在方法，不在天赋",
      ],
      action: "利用「组块化」技术把零散信息打包成有意义的单元，用同样的7个格子装下更多内容。",
      practicalTip: "作者独创「七诫」笔记法：任何列表都不要超过7个元素。如果教材中有10项内容，主动把它们重组为7个以内的组块。",
    },
    {
      title: "长期记忆（临时区）", subtitle: "海马体暂存", color: "#AA96DA", icon: "📦",
      analogy: "就像硬盘上的'下载'文件夹——文件先放这里，等待整理归档",
      mechanism: "信息经过复述循环后，被'复制粘贴'到长期记忆的临时存储区（海马体）。但这只是暂时存放，还没有真正成为你的知识。从这一刻起，大脑开始一个漫长的再加工过程——记忆巩固。",
      keyData: [
        "海马体是记忆巩固的核心解剖结构",
        "巩固发生在吃饭、洗澡、放松甚至睡觉时",
        "完全巩固一项数据需要 10~30 年",
        "必须隔一段时间回顾一次，否则信息会从临时区衰减",

      keyData: [
        "永久记忆存储在新皮层，理论上可以保持终身",

  return (

          <Card color="rgba(255,255,255,0.7)" pad={14}>
            <div style={{ fontSize: 11, fontWeight: 700, color: p.color, marginBottom: 8 }}>📊 关键数据</div>
            {p.keyData.map((d, i) => (
              <div key={i} style={{ fontSize: 12, color: "#666", lineHeight: 1.7, marginBottom: 4, paddingLeft: 10, borderLeft: `2px solid ${p.color}25` }}>{d}</div>
            ))}
          </Card>
          <Card color="rgba(255,255,255,0.7)" pad={14}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#2ECC71", marginBottom: 8 }}>✅ 你该怎么做</div>
            <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7, marginBottom: 10 }}>{p.action}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#E17055", marginBottom: 4 }}>🎯 落地操作</div>
            <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7 }}>{p.practicalTip}</div>
          </Card>
        </div>
      </Card>

      {/* Forgetting vs Learning curves */}
      <div style={{ marginTop: 28 }}>
        <h4 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 14px", color: "#1a1a2e" }}>📉 两条决定命运的曲线</h4>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Card color="linear-gradient(135deg, #f38181, #c0392b)" pad={20} border="none" style={{ color: "#fff" }}>
            <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 6 }}>艾宾浩斯遗忘曲线</div>
            <svg viewBox="0 0 220 80" style={{ width: "100%", margin: "8px 0" }}>
              <path d="M10,12 Q25,60 50,68 Q90,74 210,76" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="2" />
              <line x1="10" y1="12" x2="10" y2="78" stroke="rgba(255,255,255,0.3)" strokeWidth="0.5" strokeDasharray="2" />
              <text x="14" y="22" fill="rgba(255,255,255,0.6)" fontSize="7">20分钟后</text>
              <text x="14" y="32" fill="rgba(255,255,255,0.6)" fontSize="7">遗忘42%</text>
              <text x="80" y="68" fill="rgba(255,255,255,0.6)" fontSize="7">1天后遗忘67%</text>
              <text x="150" y="72" fill="rgba(255,255,255,0.6)" fontSize="7">1月后遗忘79%</text>
            </svg>
            <div style={{ fontSize: 11, opacity: 0.9, lineHeight: 1.7 }}>
              不复习时，学完20分钟就忘掉42%；1天后忘掉67%；1个月后遗忘79%。衰减呈指数型——越早复习，挽救越多。
            </div>
          </Card>
          <Card color="linear-gradient(135deg, #4ECDC4, #1abc9c)" pad={20} border="none" style={{ color: "#fff" }}>
            <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 6 }}>学习曲线（带平台期）</div>
            <svg viewBox="0 0 220 80" style={{ width: "100%", margin: "8px 0" }}>
              <path d="M10,72 Q30,40 50,35 Q65,36 80,38 Q95,37 110,28 Q125,29 140,30 Q155,28 180,15 Q200,12 210,10" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="2" />
              <rect x="55" y="32" width="35" height="10" rx="2" fill="rgba(255,255,255,0.15)" />
              <text x="58" y="39" fill="rgba(255,255,255,0.7)" fontSize="6">灰心平台</text>
              <rect x="120" y="26" width="30" height="8" rx="2" fill="rgba(255,255,255,0.15)" />
              <text x="122" y="32" fill="rgba(255,255,255,0.7)" fontSize="6">第二平台</text>
            </svg>
            <div style={{ fontSize: 11, opacity: 0.9, lineHeight: 1.7 }}>
              学习曲线不是单调递增！"灰心平台"是生理性的——学习速度会突然变平甚至略降。这是大脑在整合信息，坚持住就会迎来第二次跃升。
            </div>
          </Card>
        </div>
        <Insight text="大量学生在「灰心平台」期放弃，误以为自己不适合学这门课。作者反复强调：平台期是纯粹的生理现象，是大脑正在深度整合的信号。认出它、接受它、继续前进。" color="#E17055" />
      </div>
    </div>
  );
}

// ===================== SYSTEM SECTION =====================

        { phase: "全程", method: "出声复述", detail: "每天结束学习前5分钟，大声讲出今天学的核心内容。说不出来的就是明天要重点补的。" },

      keyInsight: "技能学习最忌讳「只看不做」。编程类学习天然适合主动提取——写代码就是最好的自我测试。",
    },
    {
      title: "日常读书：一本专业书的深度吸收", color: "#AA96DA",

        { phase: "进阶", method: "跨学科连接", detail: "问自己：这本书的观点和我在其他领域学到的什么知识有联系？它能解释我工作中的什么现象？这种跨学科连接是永久记忆的最强粘合剂。" },

  ];
  const c = cases[caseIdx];

  return (
    <div>
      <SectionTitle icon="📋" title="实战案例 · 三种场景的完整落地方案" sub="把前面所有方法论整合到具体场景中，展示「从第一天到最终掌握」的完整操作流程。" />
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {cases.map((cc, i) => (
          <Pill key={i} color={cc.color} active={caseIdx === i} onClick={() => setCaseIdx(i)}>
            {cc.title}
          </Pill>
        ))}
      </div>

      <Card color={`${c.color}06`} border={`1px solid ${c.color}18`}>

          <div style={{ position: "absolute", left: 8, top: 0, bottom: 0, width: 2, background: `${c.color}25` }} />
          {c.plan.map((step, i) => (
            <div key={i} style={{ marginBottom: 18, position: "relative" }}>
              <div style={{
                position: "absolute", left: -16, top: 2,
                width: 14, height: 14, borderRadius: "50%",
                background: c.color, border: "3px solid #fff",
                boxShadow: `0 0 0 2px ${c.color}40`,
              }} />
              <div style={{ paddingLeft: 12 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>

                  <Tag color="#6C5CE7">{step.method}</Tag>
                </div>
                <div style={{ fontSize: 13, color: "#555", lineHeight: 1.8 }}>{step.detail}</div>
              </div>
            </div>
          ))}
        </div>

        <Insight text={c.keyInsight} color={c.color} />
      </Card>
    </div>
  );
}

// ===================== MAIN =====================
function ScrollTop(){
  const[show,setShow]=React.useState(false);
  React.useEffect(()=>{
    const h=()=>setShow(window.scrollY>600);
    window.addEventListener("scroll",h);
    return()=>window.removeEventListener("scroll",h);
  },[]);
  if(!show)return null;
  return React.createElement("button",{onClick:()=>window.scrollTo({top:0,behavior:"smooth"}),style:{
    position:"fixed",bottom:24,right:20,zIndex:50,
    width:40,height:40,borderRadius:20,border:"none",
    background:"rgba(255,107,53,0.12)",backdropFilter:"blur(8px)",
    color:"#FF6B35",fontSize:18,cursor:"pointer",
    display:"flex",alignItems:"center",justifyContent:"center",
    boxShadow:"0 2px 8px rgba(0,0,0,0.08)",transition:"all .3s",
  }},"↑");
}
