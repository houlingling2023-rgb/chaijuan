/* ============ COMPONENT ============ */
function App() {
  const [currentView, setCurrentView] = useState("home");
  const [currentChapter, setCurrentChapter] = useState(0);
  const [currentSection, setCurrentSection] = useState(0);

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg }}>
      <style>{GLOBAL_STYLES}</style>

      {currentView === "home" ? (
        <HomeView
          onSelectChapter={(idx) => {
            setCurrentChapter(idx);
            setCurrentSection(0);
            setCurrentView("detail");
          }}
        />
      ) : (
        <DetailView
          chapter={DATA.chapters[currentChapter]}
          chapterIdx={currentChapter}
          section={DATA.chapters[currentChapter].sections[currentSection]}
          sectionIdx={currentSection}
          onBack={() => setCurrentView("home")}
          onSelectChapter={(idx) => {
            setCurrentChapter(idx);
            setCurrentSection(0);
          }}
          onSelectSection={(idx) => setCurrentSection(idx)}
          onPrevSection={() => currentSection > 0 && setCurrentSection(currentSection - 1)}
          onNextSection={() => currentSection < DATA.chapters[currentChapter].sections.length - 1 && setCurrentSection(currentSection + 1)}
        />
      )}
    </div>
  );
}

/* ============ CHAPTER CARD ============ */

        e.currentTarget.style.borderLeftColor = chapter.color;
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.boxShadow = "none";
        e.currentTarget.style.transform = "none";
      }}

/* ============ STEP CARD ============ */
function StepCard({ step, index, color }) {
  const [isOpen, setIsOpen] = useState(false);

  return (
    <div
      onClick={() => setIsOpen(!isOpen)}
      style={{
        background: COLORS.cardBg,
        border: `1px solid ${COLORS.border}`,
        borderLeft: `3px solid ${isOpen ? color : COLORS.border}`,
        borderRadius: 8,
        padding: "14px 16px",
        cursor: "pointer",
        transition: "all 0.2s ease",
      }}
      onMouseEnter={(e) => {
        e.currentTarget.style.background = `${color}05`;
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.background = COLORS.cardBg;
      }}
    >
      <div style={{
        display: "flex",
        alignItems: "flex-start",
        gap: 12,
      }}>
        <div style={{
          background: `${color}20`,
          color: color,
          width: 28,
          height: 28,
          borderRadius: "50%",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 11,
          fontWeight: 800,
          flexShrink: 0,
        }}>
          {String(index + 1).padStart(2, "0")}

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontSize: 14,
            fontWeight: 700,
            color: COLORS.text,
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            marginBottom: isOpen ? 12 : 0,
          }}>

              fontSize: 10,

          </div>
          {isOpen && (
            <p style={{
              fontSize: 13,

              lineHeight: 1.8,
              animation: "fadeUp 0.25s ease",
            }}>
              {step.detail}
            </p>
          )}
        </div>
      </div>
    </div>
  );
}
