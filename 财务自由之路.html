/* ===== COMPONENT: ReadBar ===== */
function ReadBar() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const scrolled = el.scrollTop;
      const total = el.scrollHeight - el.clientHeight;
      setPct(total > 0 ? Math.round((scrolled / total) * 100) : 0);
    };
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: 3, background: C.border, zIndex: 1000 }}>
      <div style={{ height: "100%", width: `${pct}%`, background: C.gold, transition: "width 0.1s" }} />
    </div>
  );
}

function ModulePage({ moduleIndex, onNext }) {
  const m = MODULES[moduleIndex];

  return (
    <div style={{ animation: "fadeUp 0.4s ease" }}>
      {/* Header */}
      <div style={{ background: C.white, borderRadius: 12, padding: "28px 24px", border: `1px solid ${C.border}`, borderTop: `3px solid ${m.color}`, marginBottom: 32 }}>

          模块 {moduleIndex + 1} / 7
        </div>
        <h2 style={{ fontSize: 26, fontWeight: 900, color: C.text, marginBottom: 6 }}>{m.icon} {m.title}</h2>
        <p style={{ fontSize: 14, color: C.muted, marginBottom: 0 }}>{m.subtitle}</p>
      </div>

      {/* Formula */}
      <Formula text={m.formula} note={m.formulaNote} color={m.color} />

      {/* Core insight */}
      <div style={{ margin: "28px 0" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: 1, marginBottom: 12 }}>核心论点</div>
        <p style={{ fontSize: 15, color: C.text, lineHeight: 1.9, whiteSpace: "pre-line", textAlign: "left" }}>{m.insight}</p>
      </div>

      {/* Cases */}
      <div style={{ margin: "32px 0" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.muted, letterSpacing: 1, marginBottom: 16 }}>

      <ActionBox action={m.action} color={m.color} />

      {/* Commentary */}
      <Commentary text={m.commentary} />

      {/* Transition */}
      <TransitionCard text={m.transition} onNext={!isLast ? onNext : undefined} />
    </div>
  );
}

/* ===== APP ===== */
function App() {
  const [active, setActive] = useState(0);

  const goTo = (i) => {
    setActive(i);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <ReadBar />
      <TabNav active={active} onSelect={goTo} />
      <main style={{ maxWidth: 720, margin: "0 auto", padding: "32px 16px 60px" }}>
        {active === 0 && <OverviewPage onGoModule={(i) => goTo(i)} />}
        {active >= 1 && active <= 7 && (
          <ModulePage
            moduleIndex={active - 1}
            onNext={() => goTo(active === 7 ? 8 : active + 1)}
          />
        )}
        {active === 8 && <RetroPage />}
      </main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
