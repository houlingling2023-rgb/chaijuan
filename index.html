function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= breakpoint);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, [breakpoint]);
  return isMobile;
}

function TagBtn({ label, active, onClick }) {

    <button onClick={onClick} style={{
      padding:"6px 18px",borderRadius:20,
      border:`1px solid ${active?"#7a6a50":"#d5cfc5"}`,
      background:active?"rgba(122,106,80,0.12)":"rgba(255,255,255,0.5)",

      fontSize:13,fontWeight:active?700:400,
      cursor:"pointer",transition:"all .3s",
      fontFamily:"'Noto Serif SC',serif",
    }}>{label}</button>
  );
}

function DoubanRating({ score, link }) {
  const color = score >= 8 ? "#1a9850" : score >= 7 ? "#d4a847" : "#e08040";
  const inner = (
    <span style={{
      display:"inline-flex",alignItems:"center",gap:6,
      padding:"3px 10px 3px 6px",borderRadius:8,
      background:"rgba(46,125,50,0.06)",
      border:"1px solid rgba(46,125,50,0.12)",
      cursor: link ? "pointer" : "default",
      transition:"all .2s",
    }}>
      <span style={{
        fontSize:11,fontWeight:800,color:"#fff",
        background:"linear-gradient(135deg,#2E8B57,#1a6b3a)",
        borderRadius:4,padding:"2px 5px",lineHeight:1,
      }}>豆瓣</span>
      <span style={{fontSize:15,fontWeight:900,color,fontFamily:"'Inter',sans-serif"}}>{score.toFixed(1)}</span>
    </span>
  );
  if (link) return <a href={link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}} onClick={e=>e.stopPropagation()}>{inner}</a>;
  return inner;
}

function CSSCover({ style: s, size = "normal", coverImage }) {
  const w = size === "small" ? 72 : 120;
  const h = size === "small" ? 96 : 160;
  const titleFs = size === "small" ? 11 : 16;
  const subFs = size === "small" ? 7 : 9;

  // Use real cover image if available
  if (coverImage) {
    return (
      <div style={{
        width:w, height:h, borderRadius:6, overflow:"hidden", flexShrink:0,
        boxShadow:"2px 4px 12px rgba(0,0,0,0.3)",
      }}>
        <img src={coverImage} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      </div>
    );
  }

  return (
    <div style={{
      width:w, height:h, borderRadius:6, overflow:"hidden", position:"relative",
      background:s.bg, flexShrink:0,
      boxShadow:"2px 4px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1)",
    }}>
      {s.hasGlow && <div style={{position:"absolute",bottom:"20%",left:"40%",width:"30%",height:"35%",background:`radial-gradient(ellipse, ${s.glowColor}60 0%, transparent 70%)`,filter:"blur(8px)"}}/>}

  const bookGridRef = useRef(null);
  const isMobile = useIsMobile();

  // Deep link: ?book=书名
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const bookName = params.get("book");
    if (bookName) {
      const found = BOOKS.find(b => b.title === bookName);
      if (found) setActiveBook(found);
    }
  },[]);

  // Update URL when opening/closing book
  useEffect(()=>{
    if (activeBook) {
      window.history.replaceState(null, "", "?book=" + encodeURIComponent(activeBook.title));
    } else {
      window.history.replaceState(null, "", window.location.pathname);
    }
  },[activeBook]);

      {/* ===== BOOK GRID ===== */}
      <section ref={bookGridRef} style={{maxWidth:1200,margin:"0 auto",padding:"0 clamp(16px,4vw,32px) 40px",position:"relative",zIndex:1}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(min(360px, 100%), 1fr))",gap:isMobile?18:24}}>
          {filtered.map((book,i)=>(
            <BookCard key={book.id} book={book} index={i} onClick={()=>setActiveBook(book)}/>
          ))}
        </div>
        {filtered.length===0 && (
          <div style={{textAlign:"center",padding:"60px 0",color:"#a09080",fontSize:14}}>
            {searchQuery ? `未找到与「${searchQuery}」相关的书籍` : "此分类下暂无书籍，敬请期待更多拆解 ✨"}
          </div>
        )}
      </section>

      {/* ===== QUOTE ===== */}
      <section style={{maxWidth:640,margin:"0 auto",padding:"40px 24px",textAlign:"center",position:"relative",zIndex:1}}>
        <div style={{
          background:"rgba(255,255,255,0.6)",backdropFilter:"blur(8px)",
          borderRadius:16,padding:"36px 32px",border:"1px solid rgba(200,184,154,0.3)",
        }}>
          <span style={{fontSize:48,color:"#d0c8b8",fontFamily:"Georgia,serif",lineHeight:1}}>"</span>
          <p style={{fontSize:16,color:"#4a3a28",lineHeight:2,fontWeight:400,margin:"-16px 0 16px",fontStyle:"italic"}}>
            {randomQuote.text}
          </p>
          <div style={{width:40,height:1,background:"#c8b89a",margin:"0 auto 12px"}}/>
          <p style={{fontSize:12,color:"#a09080"}}>—— 摘自《{randomQuote.book}》</p>
        </div>
      </section>

      {/* ===== FOOTER ===== */}
      <footer style={{textAlign:"center",padding:"40px 24px 32px",position:"relative",zIndex:1,borderTop:"1px solid rgba(200,184,154,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:16}}>📖</span>
          <span style={{fontSize:14,fontWeight:700,color:"#5a4a3a",letterSpacing:3,fontFamily:"'ZCOOL XiaoWei',serif"}}>拆卷</span>
        </div>
        <p style={{fontSize:11,color:"#b0a890",letterSpacing:2}}>一卷拆尽，满纸生花</p>
        <p style={{fontSize:11,color:"#c8c0b0",marginTop:12,marginBottom:isMobile?60:0}}>© 2026 拆卷 · 用拆解传递知识的力量</p>
        <div style={{maxWidth:480,margin:"16px auto 0",background:"rgba(200,184,154,0.08)",borderRadius:6,padding:"10px 16px",border:"1px solid rgba(200,184,154,0.12)"}}>
          <p style={{fontSize:10,color:"#c0b8a4",lineHeight:1.8,letterSpacing:0.3}}>{"⚠ 免责声明：本站所有拆书内容仅供个人学习与读书笔记整理之用，不用于任何商业目的。所有书籍版权归原作者及出版社所有。如有侵权，请联系博主，将第一时间删除处理。"}</p>
        </div>
      </footer>
      {isMobile && !activeBook && <BottomNav activeTab={mobileTab} onBookshelf={()=>{setMobileTab("bookshelf");bookGridRef.current&&bookGridRef.current.scrollIntoView({behavior:"smooth"})}} onAbout={()=>{setMobileTab("about");setShowAbout(true)}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
